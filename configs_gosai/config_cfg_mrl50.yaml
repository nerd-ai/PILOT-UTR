defaults:
  - /callbacks: [checkpoint_every_n_steps, checkpoint_monitor, learning_rate_monitor]
  - /model: dnaconv
  - /strategy: ddp
  - /noise: loglinear
  - /lr_scheduler: constant_warmup
  - _self_

mode: train
diffusion: absorbing_state
backbone: cnn
parameterization: subs
time_conditioning: False
T: 0
subs_masking: False
debug_mode: False

model:
  length: 50
  cls_free_guidance: True
  # 70th percentile of rl in data_and_model/train_dataset.csv.
  # Class 1 is label > threshold, i.e. the top 30%.
  cls_free_threshold: 7.697136436435001
  cls_free_prob: 0.3
  cls_free_weight: 0.3

seed: 1

data:
  tokenizer_type: simple_vocab
  tokenizer_vocab_path: /home/xli263/xli/utr_design/DRAKES/data_and_model/data/4_base_token_vocab_no_eos.json
  motif_vocab_path: /home/xli263/xli/utr_design/DRAKES/data_and_model/data/4_base_token_vocab_no_eos.json
  utr_csv_path: /home/xli263/xli/utr_design/DRAKES/drakes_rna/data_and_model/train_dataset.csv
  seq_column: utr
  label_column: rl
  utr_fasta_path: null
  streaming: False
  vocab_size: 5
  pad_token_id: 4
  eos_token_id: null
  mask_token_id: 5
  eos_token: null
  pad_token: N
  normalize_case: True

loader:
  global_batch_size: 512
  eval_global_batch_size: ${.global_batch_size}
  batch_size: ${div_up:${.global_batch_size}, ${eval:${trainer.devices} * ${trainer.num_nodes}}}
  eval_batch_size: ${div_up:${.eval_global_batch_size}, ${eval:${trainer.devices} * ${trainer.num_nodes}}}
  num_workers: 4
  pin_memory: True

sampling:
  predictor: ddpm
  steps: 128
  noise_removal: True
  num_sample_batches: 2
  num_sample_log: 2
  semi_ar: False
  stride_length: 1
  num_strides: 1

training:
  ema: 0.9999
  antithetic_sampling: True
  importance_sampling: False
  sampling_eps: 1e-3
  change_of_variables: False

eval:
  checkpoint_path: ''
  disable_ema: False
  compute_generative_perplexity: True
  perplexity_batch_size: 8
  compute_perplexity_on_sanity: False
  gen_ppl_eval_model_name_or_path: gpt2-large
  generate_samples: False
  subset_size: 30000

optim:
  weight_decay: 0
  lr: 3e-4
  beta1: 0.9
  beta2: 0.999
  eps: 1e-8

trainer:
  _target_: lightning.Trainer
  accelerator: cuda
  num_nodes: 1
  devices: ${device_count:}
  accumulate_grad_batches: ${div_up:${loader.global_batch_size}, ${eval:${trainer.devices} * ${loader.batch_size} * ${trainer.num_nodes}}}
  gradient_clip_val: 1.0
  precision: 'bf16'
  num_sanity_val_steps: 2
  max_steps: 51000
  log_every_n_steps: 10
  limit_train_batches: 1.0
  limit_val_batches: 1.0
  val_check_interval: 510

wandb:
  project: utr-dna-cfg
  notes: MRL 50nt CFG, rl top30 threshold
  group: null
  job_type: null
  name: MRL_50nt_rl_top30_cfg
  id: ${uuid:}
  tags:
    - ${noise.type}
    - cfg
    - MRL_50nt

hydra:
  run:
    dir: /home/xli263/xli/utr_design/DRAKES/outputs_cfg_mrl50/${now:%Y.%m.%d}/${now:%H%M%S}
  job:
    chdir: false

checkpointing:
  save_dir: /home/xli263/xli/utr_design/DRAKES/drakes_rna/checkpoints_cfg_mrl50_rl_top30
  resume_from_ckpt: false
  resume_ckpt_path: null

finetuning:
  gumbel_softmax_temp: 1.0
  truncate_steps: 50
